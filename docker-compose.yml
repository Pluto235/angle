services:
  db:
    image: m.daocloud.io/docker.io/postgres:16-alpine
    container_name: angle-db
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-angle}
      POSTGRES_USER: ${POSTGRES_USER:-angle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-angle}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-angle} -d ${POSTGRES_DB:-angle}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: angel-app
    container_name: angle-web
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
